{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center my-5">
    <div class="col-md-4">
        <div class="text-center mb-4">
            <h2>Sign-In</h2>
        </div>
        <div class="form-container">
            <form method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label fw-bold small">Username</label>
                    <input type="text" class="form-control" id="username" name="username" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label fw-bold small">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 shadow-sm mb-3">Sign in</button>
            </form>
            <p class="small text-muted">By continuing, you agree to Testing App's Conditions of Use and Privacy Notice.</p>
        </div>
        
        <div class="text-center mt-4 position-relative">
            <hr>
            <span class="bg-light px-2 text-muted small position-absolute top-50 start-50 translate-middle" style="background-color: #eaeded !important;">New to Testing App?</span>
        </div>
        
        <div class="mt-3">
            <a href="{{ url_for('register') }}" class="btn btn-light border border-dark w-100 rounded-pill py-2">Create your Testing App account</a>
        </div>
    </div>
</div>
{% endblock %}

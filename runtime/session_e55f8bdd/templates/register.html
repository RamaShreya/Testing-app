{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center my-5">
    <div class="col-md-4">
        <div class="text-center mb-4">
            <h2>Create account</h2>
        </div>
        <div class="form-container">
            <form method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label fw-bold small">Your name (Username)</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="First and last name" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label fw-bold small">Password</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="At least 6 characters" required>
                    <div class="form-text small"><i class="fa-solid fa-circle-info text-primary"></i> Passwords will be securely hashed.</div>
                </div>
                <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 shadow-sm mb-3">Continue</button>
            </form>
            <p class="small text-muted mb-4">By creating an account, you agree to Testing App's Conditions of Use and Privacy Notice.</p>
            
            <hr>
            <p class="small mb-0 mt-3">Already have an account? <a href="{{ url_for('login') }}" class="text-decoration-none text-primary">Sign in <i class="fa-solid fa-caret-right"></i></a></p>
        </div>
    </div>
</div>
{% endblock %}
